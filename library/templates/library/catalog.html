{% extends 'base.html' %}

{% block content %}
  <h2>{{ page_title }}</h2>
  <div class="row">
    {% for item in items %}
      <div class="col-md-4 mb-4">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">{{ item.title }}</h5>
            <a href="{% url 'item_detail' item.pk %}" class="btn btn-primary">View Details</a>
          </div>
        </div>
      </div>
    {% endfor %}
  </div>
{% endblock %}
